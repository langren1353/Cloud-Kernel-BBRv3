name: Debian Kernel ARM64 latest

on:
  workflow_dispatch:
  #schedule:
    #- cron: "36 19 * * 2,6"
   # inputs:
    #  ssh:
     #   description: 'SSH connection to Actions'
      #  required: false
       # default: 'false'

env:
  UPLOAD_DIR: true
  UPLOAD_RELEASE: true
  UPLOAD_WETRANSFER: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    container: docker.io/qctt/kernelbuild:debian12
    
    steps:
    - name: Base requirements
      run: |
        # packages
        apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 6ED0E7B82643E131 78DBA3BC47EF2265 F8D2585B8783D481
        apt update && apt install -y git nodejs npm libssl-dev
        
    - name: Checkout
      uses: actions/checkout@main
    
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt update && apt install dwarves gcc-aarch64-linux-gnu -y
        chown $USER:$GROUPS /workdir
        chown $USER:$GROUPS /workdir/upload

    - name: Check for updates
      id: check
      run: |
       github_tag=$(curl -s 'https://api.github.com/repos/ylx2016/kernel/releases' | grep 'Debian_Kernel' | grep '_arm64_' | head -n 1 | awk -F '"' '{print $4}' | awk -F '[/]' '{print $8}')
       github_ver=$(curl -s 'https://api.github.com/repos/ylx2016/kernel/releases' | grep ${github_tag}  | grep 'deb' | grep 'headers' | awk -F '"' '{print $4}' | awk -F '[/]' '{print $9}' | awk -F '[-]' '{print $3}' | awk -F '[_]' '{print $1}')
       kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
       echo "github_ver=" $github_ver
       echo "kernel_ver=" $kernel_ver
       if [[ $github_ver == *"$kernel_ver"* ]]; then
         echo "::set-output name=status::fail"
       else
         echo "::set-output name=status::success"
       fi

    - name: Get source code
      id: code
      working-directory: /workdir
      if: steps.check.outputs.status == 'success'
      run: |
        df -hT $PWD
        kernel_file=$(curl -s https://www.kernel.org/ | grep 'alt="Download"' | awk -F '"' '{print $2}')
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        wget -O kernel.tar.xz $kernel_file
        tar -Jxvf kernel.tar.xz -C /workdir && cd /workdir/linux-$kernel_ver
        echo "TCP send Speed"
        sed -i s/'tp->snd_cwnd = min(tp->snd_cwnd'/'tp->snd_cwnd = max(tp->snd_cwnd'/ net/ipv4/tcp_input.c
        sed -i 's/define\s*TCP_INIT_CWND\s*10/define TCP_INIT_CWND 99/' include/net/tcp.h
        sed -i s/'define\s*TCP_RTO_MIN\s*((unsigned)(HZ\/5))'/'define TCP_RTO_MIN    ((unsigned)(HZ\/25))'/ include/net/tcp.h
        echo "::set-output name=status::success"

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Compile the kernel
      id: compile
      if: steps.code.outputs.status == 'success'
      working-directory: /workdir
      run: |
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        cd linux-$kernel_ver
        apt install -y libssl-dev build-essential bc kmod cpio flex bison libncurses-dev libelf-dev
        apt install -y build-essential libssl-dev libncurses-dev bison flex libelf-dev bc kmod cpio
        # wget -O .config https://raw.githubusercontent.com/langren1353/linux-kernel/master/5.13.arm64.config
        wget -O .config https://raw.githubusercontent.com/langren1353/linux-kernel/master/kernel-aarch64-rhel.config
        # 2. 修复为当前内核兼容配置（关键）
        make ARCH=arm64 olddefconfig
        
        # 3. 重新运行一次 olddefconfig 确保稳定（可选但推荐）
        make ARCH=arm64 olddefconfig
        
        # 4. 用 scripts/config 时，只做“安全”操作，并重新同步
        make ARCH=arm64 scripts
        
        # 先禁用依赖较少的选项
        scripts/config --disable DEBUG_INFO
        scripts/config --disable DEBUG_INFO_BTF
        scripts/config --disable DEBUG_INFO_DWARF4
        scripts/config --disable DEBUG_INFO_DWARF5
        scripts/config --disable DEBUG_KERNEL
        scripts/config --disable DEBUG_MISC
        
        # 关键：MODULE_SIG 和 KEYRING 要小心
        scripts/config --disable MODULE_SIG
        scripts/config --disable SYSTEM_TRUSTED_KEYRING
        scripts/config --disable SYSTEM_REVOCATION_KEYS

        # 启用 NAT 支持
        scripts/config --enable CONFIG_NF_NAT
        scripts/config --enable CONFIG_NF_CONNTRACK
        scripts/config --enable CONFIG_IP_NF_NAT
        scripts/config --module CONFIG_NETFILTER_XT_TARGET_MASQUERADE
        
        # 5. ⚠️ 重要：再次运行 olddefconfig 以解决依赖冲突！
        make ARCH=arm64 olddefconfig
        
        # 6. 最后强制清空 SYSTEM_TRUSTED_KEYS（必须是空字符串）
        sed -i 's/CONFIG_SYSTEM_TRUSTED_KEYS=.*/CONFIG_SYSTEM_TRUSTED_KEYS=""/' .config
        
        # 7. 编译（加 -d）
        time make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) bindeb-pkg -d
        cd /workdir && mv *.deb /workdir/upload
        echo "::set-output name=status::success"
        echo "FILE_DATE=Kernel_Debian_$kernel_ver_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV   

    - name: Check space usage
      if: (!cancelled()) && steps.compile.outputs.status == 'success'
      run: df -hT     

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        echo "::set-output name=release_tag::Debian_Kernel_${kernel_ver}_latest_arm64_bbr_$(date +"%Y.%m.%d-%H%M")"
        touch release.txt
        echo "::set-output name=status::success"

    - name: Upload kernel to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: /workdir/upload/*
