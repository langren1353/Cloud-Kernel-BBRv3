name: Debian Kernel Latest

on:
  workflow_dispatch:

env:
  UPLOAD_DIR: true
  UPLOAD_RELEASE: true
  UPLOAD_WETRANSFER: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    container: qctt/kernelbuild:debian12

    steps:
    - name: Base requirements
      run: |
        set -e
        install -d /etc/apt/keyrings
        wget -qO /etc/apt/keyrings/debian-archive-key-12.asc https://ftp-master.debian.org/keys/archive-key-12.asc
        wget -qO /etc/apt/keyrings/debian-archive-key-12-security.asc https://ftp-master.debian.org/keys/archive-key-12-security.asc
        gpg --dearmor -o /etc/apt/keyrings/debian-archive-key-12.gpg /etc/apt/keyrings/debian-archive-key-12.asc
        gpg --dearmor -o /etc/apt/keyrings/debian-archive-key-12-security.gpg /etc/apt/keyrings/debian-archive-key-12-security.asc
        rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
        cat <<'EOF' >/etc/apt/sources.list
        deb [signed-by=/etc/apt/keyrings/debian-archive-key-12.gpg] http://deb.debian.org/debian bookworm main
        deb [signed-by=/etc/apt/keyrings/debian-archive-key-12.gpg] http://deb.debian.org/debian bookworm-updates main
        deb [signed-by=/etc/apt/keyrings/debian-archive-key-12-security.gpg] http://security.debian.org/debian-security bookworm-security main
        EOF
        apt-get update
        apt-get install -y curl git gnupg nodejs npm wget
        
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Kernel Versions
      id: versions
      run: |
        github_tag=$(curl -s 'https://api.github.com/repos/ylx2016/kernel/releases' | grep 'Debian_Kernel' | grep '_latest_bbr_' | head -n 1 | awk -F '"' '{print $4}' | awk -F '[/]' '{print $8}')
        github_ver=$(curl -s 'https://api.github.com/repos/ylx2016/kernel/releases' | grep ${github_tag}  | grep 'deb' | grep 'headers' | awk -F '"' '{print $4}' | awk -F '[/]' '{print $9}' | awk -F '[-]' '{print $3}' | awk -F '[_]' '{print $1}')
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        echo "github_ver=$github_ver"
        echo "kernel_ver=$kernel_ver"
        if [ "$github_ver" = *"$kernel_ver"* ]; then
            echo "action_echo=enabled" >> $GITHUB_ENV
            echo "VERSIONS_STATUS=fail" >> $GITHUB_ENV
        else
            echo "action_echo=enabled" >> $GITHUB_ENV
            echo "VERSIONS_STATUS=success" >> $GITHUB_ENV
        fi
        echo "$VERSIONS_STATUS"

    - name: Get Source Code
      if: env.VERSIONS_STATUS == 'success'
      working-directory: /workdir
      run: |
        df -hT $PWD
        kernel_file=$(curl -s https://www.kernel.org/ | grep 'alt="Download"' | awk -F '"' '{print $2}')
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        wget -O kernel.tar.xz $kernel_file
        tar -Jxvf kernel.tar.xz -C /workdir && cd /workdir/linux-$kernel_ver
        echo "TCP send Speed"
        sed -ri 's/^#define[[:space:]]+TCP_INIT_CWND[[:space:]]+10$/#define TCP_INIT_CWND 64/' include/net/tcp.h
        grep -n '^#define[[:space:]]\+TCP_INIT_CWND[[:space:]]\+64$' include/net/tcp.h
        echo "action_echo=enabled" >> $GITHUB_ENV
        echo "CODE_STATUS=success" >> $GITHUB_ENV

    - name: Compile Kernel
      if: env.VERSIONS_STATUS == 'success' && env.CODE_STATUS == 'success'
      working-directory: /workdir
      run: |
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        cd linux-$kernel_ver
        wget -O .config https://raw.githubusercontent.com/langren1353/linux-kernel/master/config_elrepo
        sed -ri '/CONFIG_SYSTEM_TRUSTED_KEYS/s/=.+/=""/g' .config
        scripts/config --disable MODULE_SIG
        scripts/config --disable DEBUG_INFO
        scripts/config --disable DEBUG_INFO_BTF
        scripts/config --disable DEBUG_INFO_DWARF4
        scripts/config --disable DEBUG_INFO_DWARF5
        scripts/config --disable DEBUG_INFO_NONE
        scripts/config --disable SYSTEM_TRUSTED_KEYS
        scripts/config --disable SYSTEM_REVOCATION_KEYS
        
        
        echo -e "$(nproc) thread compile"
        echo "当前空间大小："
        export TMPDIR=/workdir/tmp
        mkdir -p $TMPDIR
        df -h
        du -sh $GITHUB_WORKSPACE/
        du -sh $TMPDIR/
        echo "开始编译"
        time make -j$(nproc) bindeb-pkg
        rm -f /workdir/*-dbg_*.deb
        cd /workdir && mv *.deb /workdir/upload
        echo "action_echo=enabled" >> $GITHUB_ENV
        echo "COMPILE_STATUS=success" >> $GITHUB_ENV
        echo "FILE_DATE=Kernel_Debian_$kernel_ver_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && env.COMPILE_STATUS == 'success' && !cancelled()
      run: |
        kernel_ver=$(curl -s https://www.kernel.org/ | grep ' <a href="https://cdn.kernel.org/pub/linux/kernel/' | head -n 1 | awk -F '[>]' '{print $2}' | awk -F '[<]' '{print $1}')
        echo "action_echo=enabled" >> $GITHUB_ENV
        echo "release_tag=Debian_Kernel_${kernel_ver}_latest_bbr_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        touch release.txt
        echo "TAG_STATUS=success" >> $GITHUB_ENV

    - name: Upload Kernel to release
      uses: softprops/action-gh-release@v2
      if: env.TAG_STATUS == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}
      with:
        tag_name: ${{ env.release_tag }}
        body_path: release.txt
        files: /workdir/upload/*

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@v1.2.2
      with:
        token: ${{ secrets.TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 2
